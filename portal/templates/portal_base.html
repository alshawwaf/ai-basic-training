<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Ninja Program{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css?v=43">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <script>if(localStorage.getItem('portalTheme')!=='light')document.documentElement.setAttribute('data-theme','dark');</script>
</head>
<body style="justify-content: center;"{% if lesson_id is defined and lesson_id %} data-stage="{{ lesson_id[:2] }}"{% endif %}>
    {% from "icons.html" import brand_logo %}
    <nav class="top-nav">
        <a href="/" class="nav-brand">{{ brand_logo(38) }}</a>
        <div class="top-controls">
            <span class="user-pill" id="userPill" style="display:none" onclick="showUserMenu(event)" title="Signed in"></span>
            <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
                <span class="icon-sun">&#9728;</span>
                <span class="icon-moon">&#9790;</span>
            </button>
        </div>
    </nav>

    <!-- Command menu (opens on logo click) -->
    <div class="cmd-overlay" id="cmdOverlay" onclick="closeCommandMenu()"></div>
    <div class="cmd-menu" id="cmdMenu">
        <div class="cmd-section" id="cmdContinue"></div>
        <div class="cmd-section" id="cmdStats"></div>
        <div class="cmd-section" id="cmdBookmarks"></div>
        <div class="cmd-divider"></div>
        <div class="cmd-section cmd-actions">
            <button class="cmd-btn cmd-btn-bookmark" id="cmdAddBookmark" onclick="addBookmark()" style="display:none">
                <span class="cmd-icon">&#9733;</span> Bookmark this step
            </button>
            <button class="cmd-btn cmd-btn-danger" onclick="confirmResetAll()">
                <span class="cmd-icon">&#8635;</span> Reset all progress
            </button>
        </div>
        <div class="cmd-confirm" id="cmdConfirm" style="display:none">
            <p>Clear all progress and bookmarks?</p>
            <div class="cmd-confirm-btns">
                <button class="cmd-btn cmd-btn-danger" onclick="resetAllProgress()">Yes, reset</button>
                <button class="cmd-btn" onclick="cancelReset()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Reusable confirm modal — replaces native browser confirm() -->
    <div class="confirm-modal-overlay" id="confirmModalOverlay" onclick="hideConfirmModal(false)"></div>
    <div class="confirm-modal" id="confirmModal" role="dialog" aria-modal="true" aria-labelledby="confirmModalTitle">
        <div class="confirm-modal-icon" id="confirmModalIcon" aria-hidden="true">&#9888;</div>
        <h2 class="confirm-modal-title" id="confirmModalTitle">Are you sure?</h2>
        <p class="confirm-modal-body" id="confirmModalBody"></p>
        <div class="confirm-modal-actions">
            <button class="confirm-modal-btn confirm-modal-cancel" id="confirmModalCancel" type="button" onclick="hideConfirmModal(false)">Cancel</button>
            <button class="confirm-modal-btn confirm-modal-ok" id="confirmModalOk" type="button" onclick="hideConfirmModal(true)">Confirm</button>
        </div>
    </div>

    <!-- Welcome modal — first-visit identity -->
    <div class="confirm-modal-overlay" id="welcomeOverlay"></div>
    <div class="confirm-modal" id="welcomeModal" role="dialog" aria-modal="true" aria-labelledby="welcomeTitle" style="max-width:380px">
        <h2 class="confirm-modal-title" id="welcomeTitle">Welcome</h2>
        <p class="confirm-modal-body">Choose a display name to track your progress across sessions.</p>
        <input type="text" id="welcomeName" class="guess-input" placeholder="Your name" maxlength="40"
               style="width:100%; margin:8px 0 4px; box-sizing:border-box;">
        <div id="welcomeError" style="color:var(--red); font-size:13px; min-height:20px; margin-bottom:4px;"></div>
        <div class="confirm-modal-actions">
            <button class="confirm-modal-btn confirm-modal-cancel" type="button" onclick="skipWelcome()">Skip</button>
            <button class="confirm-modal-btn confirm-modal-ok" id="welcomeSubmit" type="button" onclick="submitWelcome()">Start</button>
        </div>
    </div>

    {% block body %}{% endblock %}
    <script src="/static/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
