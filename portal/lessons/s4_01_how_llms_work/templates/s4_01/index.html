{% extends "portal_base.html" %}
{% block title %}{{ lesson_title }} — AI Ninja Program{% endblock %}
{% block body %}
<script>
// The lesson welcome page is a thin redirect: send returning learners straight
// to the step they were last on, and first-time visitors to step 1.
(function() {
    var lessonId  = '{{ lesson_id }}';
    var urlPrefix = '{{ url_prefix }}';
    var target    = 0;
    try {
        var lastBy = JSON.parse(localStorage.getItem('portalLastStep') || '{}');
        if (typeof lastBy[lessonId] === 'number') {
            target = lastBy[lessonId];
        }
    } catch (e) { /* fall through to step 0 */ }
    window.location.replace(urlPrefix + '/step/' + target);
})();
</script>
{% endblock %}
