<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Ninja Program{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Roboto+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <script>if(localStorage.getItem('portalTheme')!=='light')document.documentElement.setAttribute('data-theme','dark');</script>
</head>
<body style="justify-content: center;">
    {% from "icons.html" import brand_logo %}
    <nav class="top-nav">
        <a href="/" class="nav-brand">{{ brand_logo(38) }}</a>
        <div class="top-controls">
            <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
                <span class="icon-sun">&#9728;</span>
                <span class="icon-moon">&#9790;</span>
            </button>
        </div>
    </nav>
    {% block body %}{% endblock %}
    <script src="/static/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
