<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Ninja Program{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script>if(localStorage.getItem('portalTheme')==='dark')document.documentElement.setAttribute('data-theme','dark');</script>
</head>
<body style="justify-content: center;">
    <div class="top-controls">
        <label class="demo-toggle" title="Unlock all lessons for preview">
            <input type="checkbox" id="demoToggle" onchange="toggleDemoMode()">
            <span class="demo-slider"></span>
            <span class="demo-label">Demo</span>
        </label>
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
            <span class="icon-sun">&#9728;</span>
            <span class="icon-moon">&#9790;</span>
        </button>
    </div>
    {% block body %}{% endblock %}
    <script src="/static/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
