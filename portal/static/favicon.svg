<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Shuriken (ninja star) with circuit traces -->
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06d6e0"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Four-point shuriken -->
  <path d="M16 2 L19 13 L16 11 L13 13 Z" fill="url(#g1)"/>
  <path d="M30 16 L19 13 L21 16 L19 19 Z" fill="url(#g1)"/>
  <path d="M16 30 L13 19 L16 21 L19 19 Z" fill="url(#g1)"/>
  <path d="M2 16 L13 19 L11 16 L13 13 Z" fill="url(#g1)"/>
  <!-- Center circle -->
  <circle cx="16" cy="16" r="3.5" fill="#0f172a" stroke="url(#g1)" stroke-width="1"/>
  <!-- Circuit dots -->
  <circle cx="16" cy="5" r="1" fill="#06d6e0" opacity="0.8"/>
  <circle cx="27" cy="16" r="1" fill="#a855f7" opacity="0.8"/>
  <circle cx="16" cy="27" r="1" fill="#06d6e0" opacity="0.8"/>
  <circle cx="5" cy="16" r="1" fill="#a855f7" opacity="0.8"/>
  <!-- Circuit traces from center -->
  <line x1="16" y1="12.5" x2="16" y2="6" stroke="#06d6e0" stroke-width="0.5" opacity="0.5"/>
  <line x1="19.5" y1="16" x2="26" y2="16" stroke="#a855f7" stroke-width="0.5" opacity="0.5"/>
  <line x1="16" y1="19.5" x2="16" y2="26" stroke="#06d6e0" stroke-width="0.5" opacity="0.5"/>
  <line x1="12.5" y1="16" x2="6" y2="16" stroke="#a855f7" stroke-width="0.5" opacity="0.5"/>
</svg>
