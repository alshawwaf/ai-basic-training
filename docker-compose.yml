services:
  portal:
    build: .
    ports:
      - "5545:5000"
    environment:
      - MPLBACKEND=Agg
      - PORTAL_DB_PATH=/data/portal.db
      - PORTAL_SETTINGS_PATH=/data/site_settings.json
    volumes:
      - ./portal/static:/app/portal/static
      - ./portal/templates:/app/portal/templates
      - ./curriculum:/app/curriculum
      - portal-data:/data
    restart: unless-stopped

    # ── Security hardening ──────────────────────────────────────────────
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp/runner:size=256M,mode=1777

    # ── Resource limits ─────────────────────────────────────────────────
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 512M

volumes:
  portal-data:
