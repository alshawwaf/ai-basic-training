<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 1.1 — What is Machine Learning?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</head>
<body style="justify-content: center;">
    <div class="welcome">
        <h1>Lesson 1.1</h1>
        <p class="tagline">What is Machine Learning?</p>

        <p style="color: var(--text-dim); margin-bottom: 32px; line-height: 1.6; max-width: 520px; margin-left:auto; margin-right:auto;">
            Learn by doing, not reading. Each step lets you manipulate real data
            and discover ML concepts yourself.
        </p>

        <div class="step-cards">
            {% for s in steps %}
            <a href="/step/{{ s.id }}" class="step-card" id="card-{{ s.id }}">
                <div class="num">{{ s.id }}</div>
                <div class="info">
                    <div class="title">{{ s.title }}</div>
                    <div class="desc">{{ s.sub }}</div>
                </div>
            </a>
            {% endfor %}
        </div>

        <p style="color: var(--text-dim); margin-top: 32px; font-size: 14px;">
            ~100 minutes &middot; 10 interactive steps &middot; Start with Step 0
        </p>
    </div>

    <script>
        // Mark visited cards with a subtle checkmark
        const visited = getVisitedSteps();
        visited.forEach(step => {
            const card = document.getElementById('card-' + step);
            if (card) {
                card.querySelector('.num').style.background = 'var(--green)';
                card.querySelector('.num').textContent = '\u2713';
            }
        });
    </script>
</body>
</html>
